name: Release Core

on:
  push:
    # Matches v0.3.0 etc. — does not match editor-v* (different prefix)
    tags: ['v[0-9]*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            arch: aarch64-apple-darwin
          - os: macos-15-intel
            target: darwin-x64
            arch: x86_64-apple-darwin
          - os: ubuntu-latest
            target: linux-x64
            arch: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: linux-arm64
            arch: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: win32-x64
            arch: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build CLI and LSP
        run: cargo build --release --target ${{ matrix.arch }} --bin nemcss --bin nemcss-lsp

      - name: Build NAPI
        working-directory: crates/napi
        run: pnpm run build

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist/cli dist/napi dist/lsp
          cp crates/napi/*.node dist/napi/
          if [ -f "target/${{ matrix.arch }}/release/nemcss" ]; then
            cp "target/${{ matrix.arch }}/release/nemcss" dist/cli/
          fi
          if [ -f "target/${{ matrix.arch }}/release/nemcss.exe" ]; then
            cp "target/${{ matrix.arch }}/release/nemcss.exe" dist/cli/
          fi
          if [ -f "target/${{ matrix.arch }}/release/nemcss-lsp" ]; then
            cp "target/${{ matrix.arch }}/release/nemcss-lsp" dist/lsp/
          fi
          if [ -f "target/${{ matrix.arch }}/release/nemcss-lsp.exe" ]; then
            cp "target/${{ matrix.arch }}/release/nemcss-lsp.exe" dist/lsp/
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: dist/cli/

      - uses: actions/upload-artifact@v7
        with:
          name: napi-${{ matrix.target }}
          path: dist/napi/

      - uses: actions/upload-artifact@v7
        with:
          name: nemcss-lsp-${{ matrix.target }}
          path: dist/lsp/

  build-plugins:
    name: Build JS plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @nemcss/vite build

      - run: pnpm --filter @nemcss/postcss build

      - uses: actions/upload-artifact@v7
        with:
          name: vite-plugin
          path: packages/vite-plugin-nemcss/dist/

      - uses: actions/upload-artifact@v7
        with:
          name: postcss-plugin
          path: packages/postcss-plugin-nemcss/dist/

  publish:
    name: Publish to npm + GitHub Release
    needs: [build, build-plugins]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Copy CLI binaries into platform packages
        run: |
          mkdir -p npm/@nemcss/cli-darwin-arm64/bin
          mkdir -p npm/@nemcss/cli-darwin-x64/bin
          mkdir -p npm/@nemcss/cli-linux-x64/bin
          mkdir -p npm/@nemcss/cli-linux-arm64/bin
          mkdir -p npm/@nemcss/cli-win32-x64/bin

          cp artifacts/cli-darwin-arm64/nemcss   npm/@nemcss/cli-darwin-arm64/bin/nemcss
          cp artifacts/cli-darwin-x64/nemcss     npm/@nemcss/cli-darwin-x64/bin/nemcss
          cp artifacts/cli-linux-x64/nemcss      npm/@nemcss/cli-linux-x64/bin/nemcss
          cp artifacts/cli-linux-arm64/nemcss    npm/@nemcss/cli-linux-arm64/bin/nemcss
          cp artifacts/cli-win32-x64/nemcss.exe  npm/@nemcss/cli-win32-x64/bin/nemcss.exe

          chmod +x npm/@nemcss/cli-darwin-arm64/bin/nemcss
          chmod +x npm/@nemcss/cli-darwin-x64/bin/nemcss
          chmod +x npm/@nemcss/cli-linux-x64/bin/nemcss
          chmod +x npm/@nemcss/cli-linux-arm64/bin/nemcss

      - name: Copy NAPI bindings
        run: cp artifacts/napi-*/*.node crates/napi/

      - name: Copy plugin dist
        run: |
          cp -r artifacts/vite-plugin/.   packages/vite-plugin-nemcss/dist/
          cp -r artifacts/postcss-plugin/. packages/postcss-plugin-nemcss/dist/

      - name: Publish all packages to npm
        run: |
          pnpm_publish() {
            local filter="$1"; shift
            local out
            out=$(pnpm --filter "$filter" publish --access public --no-git-checks "$@" 2>&1) && { echo "$out"; return 0; }
            echo "$out"
            echo "$out" | grep -qE "previously published|publish over" && { echo "Skipping $filter (already published)"; return 0; }
            return 1
          }
          pnpm_publish "@nemcss/cli-darwin-arm64"
          pnpm_publish "@nemcss/cli-darwin-x64"
          pnpm_publish "@nemcss/cli-linux-x64"
          pnpm_publish "@nemcss/cli-linux-arm64"
          pnpm_publish "@nemcss/cli-win32-x64"
          pnpm_publish "@nemcss/napi" --ignore-scripts
          pnpm_publish "@nemcss/vite"
          pnpm_publish "@nemcss/postcss"
          pnpm_publish "nemcss"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rename release assets
        run: |
          cp artifacts/cli-darwin-arm64/nemcss       artifacts/cli-darwin-arm64/nemcss-darwin-arm64
          cp artifacts/cli-darwin-x64/nemcss         artifacts/cli-darwin-x64/nemcss-darwin-x64
          cp artifacts/cli-linux-x64/nemcss          artifacts/cli-linux-x64/nemcss-linux-x64
          cp artifacts/cli-linux-arm64/nemcss        artifacts/cli-linux-arm64/nemcss-linux-arm64

          mkdir -p artifacts/lsp
          cp -r artifacts/nemcss-lsp-darwin-arm64 artifacts/lsp/
          cp -r artifacts/nemcss-lsp-darwin-x64   artifacts/lsp/
          cp -r artifacts/nemcss-lsp-linux-x64    artifacts/lsp/
          cp -r artifacts/nemcss-lsp-linux-arm64  artifacts/lsp/
          cp -r artifacts/nemcss-lsp-win32-x64    artifacts/lsp/

          cp artifacts/lsp/nemcss-lsp-darwin-arm64/nemcss-lsp  artifacts/lsp/nemcss-lsp-darwin-arm64/nemcss-lsp-darwin-arm64
          cp artifacts/lsp/nemcss-lsp-darwin-x64/nemcss-lsp    artifacts/lsp/nemcss-lsp-darwin-x64/nemcss-lsp-darwin-x64
          cp artifacts/lsp/nemcss-lsp-linux-x64/nemcss-lsp     artifacts/lsp/nemcss-lsp-linux-x64/nemcss-lsp-linux-x64
          cp artifacts/lsp/nemcss-lsp-linux-arm64/nemcss-lsp   artifacts/lsp/nemcss-lsp-linux-arm64/nemcss-lsp-linux-arm64

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Upload assets to GitHub Release
        run: |
          gh release upload ${{ github.ref_name }} \
            artifacts/cli-darwin-arm64/nemcss-darwin-arm64 \
            artifacts/cli-darwin-x64/nemcss-darwin-x64 \
            artifacts/cli-linux-x64/nemcss-linux-x64 \
            artifacts/cli-linux-arm64/nemcss-linux-arm64 \
            artifacts/cli-win32-x64/nemcss.exe \
            artifacts/lsp/nemcss-lsp-darwin-arm64/nemcss-lsp-darwin-arm64 \
            artifacts/lsp/nemcss-lsp-darwin-x64/nemcss-lsp-darwin-x64 \
            artifacts/lsp/nemcss-lsp-linux-x64/nemcss-lsp-linux-x64 \
            artifacts/lsp/nemcss-lsp-linux-arm64/nemcss-lsp-linux-arm64 \
            artifacts/lsp/nemcss-lsp-win32-x64/nemcss-lsp.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
